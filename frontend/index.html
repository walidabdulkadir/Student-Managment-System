<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Student Management System</title>
  </head>
  <body>
    <div class="container py-5">
      <div class="text-center mb-5">
        <h1 class="fw-bold text-primary">
          <i class="bi bi-people-fill"></i>
          Student Information
        </h1>
        <hr />
        <p class="text-muted">Add, update and manage student information</p>
      </div>

      <div class="card shadow-sm border-0 mb-5">
        <div class="card-body p-4">
          <form id="studentForm" autocomplete="off">
            <div class="row g-4">
              <!-- Full Name -->
              <div class="col-md-4">
                <label for="name" class="form-label fw-semibold">Full Name</label>
                <input
                  type="text"
                  class="form-control"
                  placeholder="Enter full name"
                  id="name"
                  required
                />
              </div>

              <!-- Email Address -->
              <div class="col-md-4">
                <label for="email" class="form-label fw-semibold">Email Address</label>
                <input
                  type="email"
                  class="form-control"
                  placeholder="Enter email address"
                  id="email"
                  required
                />
              </div>

              <!-- Phone Number -->
              <div class="col-md-4">
                <label for="phone" class="form-label fw-semibold">Phone Number</label>
                <input
                  type="tel"
                  class="form-control"
                  placeholder="Enter phone number"
                  id="phone"
                  required
                />
              </div>

              <!-- DEPARTMENT -->
              <div class="col-md-4">
                <label for="department" class="form-label fw-semibold">Department</label>
                <select class="form-select" id="department" required>
                  <option selected disabled>Select Department</option>
                  <option>Software Engineering</option>
                  <option>Computer Science</option>
                  <option>Information System</option>
                  <option>Information Technology</option>
                </select>
              </div>

              <!-- ADDRESS -->
              <div class="col-md-4">
                <label for="address" class="form-label fw-semibold">Address</label>
                <textarea
                  class="form-control"
                  rows="1"
                  placeholder="Enter address"
                  id="address"
                  required
                ></textarea>
              </div>

              <!-- GENDER -->
              <div class="col-md-4">
                <label for="gender" class="form-label fw-semibold">Gender</label>
                <select class="form-select" id="gender" required>
                  <option selected disabled>Select Gender</option>
                  <option>Male</option>
                  <option>Female</option>
                </select>
              </div>
            </div>

            <!-- SAVE AND RESET -->
            <div class="text-center mt-4">
              <button type="submit" class="btn btn-primary px-4" id="submitBtn">
                <i class="bi bi-floppy"></i> Save Student
              </button>
              <button
                type="reset"
                class="btn btn-light border px-4"
                id="resetBtn"
              >
                <i class="bi bi-arrow-counterclockwise"></i>
                Reset
              </button>
            </div>
          </form>
        </div>
      </div>

      <!-- Student List Header-->
      <div class="card shadow-sm border-0">
        <div class="card-body">
          <h3 class="text-primary mb-4">
            <i class="bi bi-people-fill"></i>
            Students List
          </h3>

          <div class="table-responsive">
            <table class="table table-hover align-middle">
              <thead class="table-light">
                <tr>
                  <th>#</th>
                  <th>Name</th>
                  <th>Email</th>
                  <th>Department</th>
                  <th>Phone</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="studentTable">
                <!-- <tr >
                  <th>1</th>
                  <th>WALID</th>
                  <th>walid@example.com</th>
                  <th>Computer Science</th>
                  <th>0951968887</th>
                  <th>
                    <button class="editBtn">
                      <i class="bi bi-pencil"></i>
                    </button>

                    <button class="deleteBtn">
                      <i class="bi bi-trash"></i>
                    </button>
                  </th>
                </tr> -->
              </tbody>
            </table>
          </div>
          <div id="tableCounter" class="text-center mt-3 text-muted"></div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
